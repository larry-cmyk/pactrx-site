<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PactRX — Coming Soon</title>
  <meta name="description" content="PactRX. Coming soon.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232A6F65'/><text x='50%' y='58%' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='system-ui' font-weight='700' font-size='16'>Rx</text></svg>">
  <style>
    :root {
      --deep-teal: #2A6F65;
      --deep-teal-light: #3A8F82;
      --warm-linen: #FAF8F5;
      --charcoal: #2D3436;
      --text-secondary: #636E72;
      --light-teal: #E8F5F1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--warm-linen);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 560px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .logo-mark {
      width: 56px;
      height: 56px;
      background: var(--deep-teal);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      box-shadow: 0 4px 12px rgba(42, 111, 101, 0.25);
    }

    .logo-text {
      font-size: 2rem;
      font-weight: 800;
      color: var(--deep-teal);
      letter-spacing: -1px;
    }

    h1 {
      font-size: 2.75rem;
      font-weight: 800;
      color: var(--charcoal);
      line-height: 1.1;
      margin-bottom: 1rem;
      letter-spacing: -1.5px;
    }

    .tagline {
      font-size: 1.125rem;
      color: var(--deep-teal);
      font-weight: 600;
      margin-bottom: 1.5rem;
      letter-spacing: 0.5px;
    }

    .description {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--deep-teal), var(--deep-teal-light));
      border-radius: 2px;
      margin: 0 auto 2.5rem;
    }

    .contact {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      background: var(--deep-teal);
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9375rem;
      border-radius: 12px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(42, 111, 101, 0.3);
    }

    .contact:hover {
      background: var(--deep-teal-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(42, 111, 101, 0.35);
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 1.25rem;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    @media (max-width: 640px) {
      h1 { font-size: 2rem; }
      .tagline { font-size: 1rem; }
      .description { font-size: 0.9375rem; }
      .logo-mark { width: 44px; height: 44px; font-size: 18px; border-radius: 11px; }
      .logo-text { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-mark">Rx</div>
      <span class="logo-text">PactRX</span>
    </div>

    <h1>Coming Soon</h1>
  </div>

  <div class="footer">
    &copy; 2026 PactRX Pharmacy. All rights reserved.
  </div>
</body>
</html>
